apiVersion: v1
kind: Service
metadata:
  name: devops-demo-service
  namespace: devops-project
  labels:
    app: devops-demo
spec:
  selector:
    app: devops-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort

---
apiVersion: v1
kind: Namespace
metadata:
  name: devops-project
  labels:
    project: devops-demo
